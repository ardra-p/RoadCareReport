<!DOCTYPE html>
<html>
<head>

<title>Reported Road Issues</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map{
height:600px;
width:100%;
}
</style>

</head>

<body>

<h2>Reported Road Issues Map</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// complaints from Django
var complaints = {{ complaints|safe }};

// create map
var map = L.map('map').setView([11.78,75.51],13);

// map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap contributors'
}).addTo(map);

// loop through complaints
complaints.forEach(function(c){

    var marker = L.marker([c.latitude,c.longitude]).addTo(map);

    marker.bindPopup(
        "<b>"+c.title+"</b><br>"+
        c.description+"<br>"+
        "<img src='"+c.photo+"' width='200'>"
    );

});

</script>

</body>
</html>
